name: Refresh SEO data

on:
  schedule:
    # Every Monday 05:30 UTC. For daily, change to "30 5 * * *"
    - cron: "30 5 * * 1"
  workflow_dispatch: {}   # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull fresh data from Semrush
        run: node scripts/refresh.mjs
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "seo-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js
          git diff --cached --quiet && echo "No changes, skipping commit" || {
            git commit -m "Refresh SEO data $(date -u +%Y-%m-%d)"
            git push
          }
